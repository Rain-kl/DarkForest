services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: darkforest
      POSTGRES_PASSWORD: darkforest
      POSTGRES_DB: darkforest
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darkforest"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://darkforest:darkforest@db:5432/darkforest
      CORS_ORIGINS: '["http://localhost","http://localhost:80"]'
    ports:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5080:80"
    depends_on:
      - backend

volumes:
  pgdata:
