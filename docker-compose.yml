services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: darkforest
      POSTGRES_PASSWORD: darkforest
      POSTGRES_DB: darkforest
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darkforest"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://darkforest:darkforest@db:5432/darkforest
      CORS_ORIGINS: '["http://localhost","http://localhost:5080"]'
      JWT_SECRET_KEY: change-me-to-a-strong-random-secret-in-production
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123456
      
    ports:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80"
    depends_on:
      - backend
  anubis:
    image: ghcr.io/rain-kl/anubis:latest
    ports:
      - "55080:8923"
    environment:
      # 反代地址
      TARGET: "http://frontend:80"
      AUTH_MODE: "pow"
      VALID_MODE: "jwt"
      DIFFICULTY: "6"
      DEFAULT_FALLBACK_ACTION: "CHALLENGE"

volumes:
  pgdata:
